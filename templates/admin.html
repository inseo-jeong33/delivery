<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 패널</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .status-pending { color: #e67e22; font-weight: bold; }
        .status-approved { color: #27ae60; }
        .btn-approve { background: #3498db; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🏢 주민 승인 관리</h1>
    <a href="/">메인으로 돌아가기</a>
    <table>
        <tr>
            <th>사용자 ID (동-호)</th>
            <th>현재 상태</th>
            <th>작업</th>
        </tr>
        {% for user_id, info in users.items() %}
        {% if user_id != 'admin' %}
        <tr>
            <td>{{ user_id }}</td>
            <td class="status-{{ info.status }}">{{ info.status }}</td>
            <td>
                {% if info.status == 'pending' %}
                <a href="/approve/{{ user_id }}" class="btn-approve">승인하기</a>
                {% else %}
                -
                {% endif %}
            </td>
        </tr>
        {% endif %}
        {% endfor %}
    </table>
</body>
</html>
