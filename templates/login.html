<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주민 인증 - 배달 메이트</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #2d3436; margin-bottom: 10px; }
        .desc { color: #636e72; font-size: 0.9em; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .auth-input { border: 2px solid #ff4757; background: #fffafb; }
        .btn { width: 100%; background: #ff4757; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .error-msg { color: #d63031; font-size: 0.85em; margin-bottom: 10px; background: #ffeded; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🏢 주민 인증</h2>
        <p class="desc">아파트 주민임을 확인하기 위해<br>동/호수와 인증 코드를 입력해주세요.</p>

        <!-- 에러 메시지 표시 -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="dong" placeholder="동 (예: 101)" required>
            <input type="text" name="ho" placeholder="호 (예: 502)" required>
            <input type="password" name="auth_code" class="auth-input" placeholder="주민 전용 코드 입력" required>
            <button type="submit" class="btn">인증 및 입장하기</button>
        </form>
    </div>
</body>
</html>
