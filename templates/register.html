{% extends "base.html" %}

{% block content %}

<div class="form-card">
    <h2>주민 회원가입</h2>
    <p class="muted">가입 후 관리자의 승인을 받아야 이용할 수 있습니다.</p>

    <form method="post">
        <label>아이디</label>
        <input name="username" required>

        <label>비밀번호</label>
        <input name="password" type="password" required>

        <label>이름</label>
        <input name="name" required>

        <div class="form-row">
            <div>
                <label>동</label>
                <input name="dong" placeholder="예: 101" required>
            </div>

            <div>
                <label>호수</label>
                <input name="ho" placeholder="예: 1203" required>
            </div>
        </div>

        <button class="btn primary full" type="submit">가입 신청</button>
    </form>
</div>

{% endblock %}
