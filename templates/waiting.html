<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>승인 대기 중</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; text-align: center; }
        .box { background: white; padding: 40px; border-radius: 12px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <h2>⏳ 승인 대기 중</h2>
        <p><strong>{{ user }}</strong>님, 주민 인증 확인 중입니다.<br>관리자가 승인하면 서비스 이용이 가능합니다.</p>
        <div class="loader"></div>
        <a href="/logout">로그아웃 후 재접속</a>
    </div>
</body>
</html>
